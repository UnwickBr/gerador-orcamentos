<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Gerador de Orcamentos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-body">
  <main class="auth-container">
    <section class="auth-card">
      <h1>Entrar no Sistema</h1>
      <p>Informe seu usuario e senha para continuar.</p>

      <form id="loginForm">
        <label>
          Usuario
          <input type="text" id="username" required autocomplete="username" />
        </label>
        <label>
          Senha
          <input type="password" id="password" required autocomplete="current-password" />
        </label>
        <button class="btn btn-primary auth-btn" type="submit">Entrar</button>
      </form>

      <p class="auth-hint">Primeiro acesso: usuario <strong>admin</strong> e senha <strong>admin123</strong>.</p>
      <p id="loginError" class="auth-error"></p>
    </section>
  </main>

  <script src="login.js"></script>
</body>
</html>
