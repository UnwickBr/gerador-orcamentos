<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro - Gerador de Orcamentos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-body">
  <main class="auth-container">
    <section class="auth-card">
      <h1>Criar Conta</h1>
      <p>Crie seu login para acessar o sistema.</p>

      <form id="registerForm">
        <label>
          Usuario (email)
          <input type="text" id="registerUsername" required autocomplete="username" />
        </label>
        <label>
          Senha
          <input type="password" id="registerPassword" required minlength="6" autocomplete="new-password" />
        </label>
        <button class="btn btn-primary auth-btn" type="submit">Criar Conta</button>
      </form>

      <a class="btn btn-ghost auth-btn auth-secondary-btn" href="/">Voltar para Login</a>
      <p id="registerMessage"></p>
    </section>
  </main>

  <script src="register.js"></script>
</body>
</html>
